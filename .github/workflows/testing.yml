name: CI

on: [push,pull_request,workflow_dispatch]

jobs:

  # ---------------------------------------------------------------------------
  # Fast unit / regression lane.
  # Imports the workflow scripts directly (no conda, no assembler tools) and runs
  # the pure-logic tests in tests/unit/ in seconds. Gates every push/PR and
  # catches regressions in coverage parsing, completeness, and chromosome
  # extraction without waiting on the full pipeline.
  # ---------------------------------------------------------------------------
  unit:
    name: "Unit tests (fast)"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install test deps
        run: |
          python -m pip install --upgrade pip
          pip install pytest biopython pandas

      - name: Run unit tests
        run: pytest -m "not integration" -v


  # ---------------------------------------------------------------------------
  # Slow integration + golden assembly-output lane.
  # Builds the conda env and runs the full `hybracter` pipeline end-to-end,
  # including the golden summary comparison in tests/test_golden.py.
  # ---------------------------------------------------------------------------
  integration:
    name: "Integration + golden (Python ${{ matrix.python-version }})"
    runs-on: ${{ matrix.os }}

    defaults:
      run:
        shell: bash -el {0}

    strategy:
      matrix:
        os: [ubuntu-latest]
        python-version: ["3.11"]

    steps:
      - uses: "actions/checkout@v4"
        with:
          fetch-depth: 0

      # Setup env
      - uses: conda-incubator/setup-miniconda@v3
        with:
          activate-environment: hybracterENV
          environment-file: build/environment.yaml
          python-version: ${{ matrix.python-version }}
          auto-activate-base: false
          channel-priority: strict
          channels: conda-forge,bioconda,defaults,anaconda
          auto-update-conda: true

      - name: "Free disk space"
        run: |
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /opt/ghc
          sudo rm -rf /opt/hostedtoolcache
          sudo apt-get clean

      - name: "Setup hybracter on ${{ matrix.os }} for Python ${{ matrix.python-version }}"
        shell: bash -l {0}
        run: |
          conda install python=${{ matrix.python-version }}
          python -m pip install --upgrade pip
          pip install .

      - name: "Run integration + golden tests and generate coverage report"
        shell: bash -l {0}
        run: |
          export TERM=linux
          pip install pytest pytest-cov
          pytest -m integration --cov=./ --cov-report xml --cov-report lcov

      - name: Upload coverage reports to Codecov
        uses: codecov/codecov-action@v3
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
