name: medaka
channels:
    - conda-forge
    - bioconda
dependencies:
    # conda-installed medaka v2 works natively on linux-64, linux-aarch64,
    # osx-64 and osx-arm64 (Apple Silicon), so a single env serves every
    # platform - no more separate medaka_mac.yaml / --mac workaround.
    # medaka pulls its own toolchain (pytorch, samtools, minimap2, bcftools,
    # htslib, pysam, pyabpoa). setuptools is pinned so `pkg_resources` is
    # always present (see issue #152).
    - medaka >=2
    - setuptools
